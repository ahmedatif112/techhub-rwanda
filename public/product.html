<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Details - TechHub Rwanda</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .product-details-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .product-details-emoji { font-size: 5rem; text-align: center; margin-bottom: 20px; }
    .product-details-category { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    .product-details-name { font-size: 2rem; font-weight: bold; margin-bottom: 15px; }
    .product-details-description { font-size: 1.1rem; color: #555; margin-bottom: 20px; line-height: 1.8; }
    .product-details-price { font-size: 2rem; color: #e94560; font-weight: bold; margin-bottom: 10px; }
    .product-details-stock { color: #888; margin-bottom: 30px; }
    .back-link { display: inline-block; margin-bottom: 20px; color: #e94560; text-decoration: none; font-size: 1rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🛒 TechHub Rwanda</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#products">Products</a></li>
    </ul>
    <div class="cart-icon" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </div>
  </nav>

  <div style="max-width:800px; margin: 40px auto; padding: 0 20px;">
    <a href="/" class="back-link">← Back to Store</a>

    <div class="product-details-container" id="productDetails">
      <p style="text-align:center;">Loading product...</p>
    </div>
  </div>

  <!-- CART SIDEBAR -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button onclick="toggleCart()">✕</button>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total">
      <strong>Total: <span id="cartTotal">0</span> RWF</strong>
    </div>
    <button class="btn checkout-btn" onclick="window.location.href='/'">Checkout on Home</button>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('techhub-cart') || '[]');

    // Update cart count on load
    document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);

    // Get product ID from URL
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    if (!productId) {
      window.location.href = '/';
    }

    // Fetch product details
    fetch(`/api/products/${productId}`)
      .then(res => res.json())
      .then(p => {
        document.title = `${p.name} - TechHub Rwanda`;
        document.getElementById('productDetails').innerHTML = `
          <div class="product-details-emoji">${p.category === 'Laptops' ? '💻' : p.category === 'Phones' ? '📱' : '🎧'}</div>
          <div class="product-details-category">${p.category}</div>
          <div class="product-details-name">${p.name}</div>
          <div class="product-details-description">${p.description}</div>
          <div class="product-details-price">${p.price.toLocaleString()} RWF</div>
          <div class="product-details-stock">In Stock: ${p.stock} units</div>
          <button class="btn" style="width:100%;padding:15px;font-size:1.1rem;" onclick='addToCart(${JSON.stringify(p)})'>
            Add to Cart 🛒
          </button>
        `;
      })
      .catch(() => {
        document.getElementById('productDetails').innerHTML = '<p style="text-align:center;color:red;">Product not found.</p>';
      });

    function addToCart(product) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.quantity += 1;
      else cart.push({ ...product, quantity: 1 });
      localStorage.setItem('techhub-cart', JSON.stringify(cart));
      document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);
      alert(`${product.name} added to cart!`);
    }

    function toggleCart() {
      document.getElementById('cartSidebar').classList.toggle('open');
      const cartItems = document.getElementById('cartItems');
      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <h4>${item.name}</h4>
            <p>${(item.price * item.quantity).toLocaleString()} RWF</p>
          </div>
        </div>
      `).join('') || '<p style="text-align:center;color:#888;">Cart is empty</p>';
      document.getElementById('cartTotal').textContent = cart.reduce((s, i) => s + i.price * i.quantity, 0).toLocaleString();
    }
  </script>

</body>
</html>
